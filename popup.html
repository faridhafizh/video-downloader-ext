<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blob Video Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <!-- Modern Logo combining play and download -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
        <defs>
          <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#a855f7" />
          </linearGradient>
        </defs>
        <rect width="120" height="120" x="4" y="4" rx="28" fill="url(#logo-grad)" />
        <path d="M 38 64 A 26 26 0 1 1 90 64" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="8" stroke-linecap="round" />
        <polygon points="56,48 56,80 82,64" fill="#ffffff" />
        <path d="M 64 22 L 64 42" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
        <path d="M 44 94 L 84 94" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
      </svg>
      <span class="logo-title">Blob Downloader</span>
    </div>
    
    <div class="action-buttons">
      <!-- Clear list of detected items -->
      <button id="clear-list" class="header-btn" title="Clear detected list">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </button>
    </div>
  </header>

  <div class="container">
    <div class="section-header">
      <span class="section-title">Videos on this page</span>
      <span id="detected-count" class="badge">0</span>
    </div>
    
    <div id="video-list">
      <!-- Loading indicator -->
      <div class="empty-state">
        <div class="spinner"></div>
        <p class="empty-title" style="margin-top: 16px;">Scanning page...</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
