  <!-- Downward arrow shaft and head -->
  <path d="M 64 24 L 64 42" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  
  <!-- Horizontal base line -->
  <path d="M 44 94 L 84 94" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
</svg>
